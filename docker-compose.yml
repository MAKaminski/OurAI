# Local development stack for OurAI.
#
# This brings up a Postgres instance for local iteration. For full Supabase
# (Auth + Realtime + Studio) locally, prefer the Supabase CLI:
#   pnpm dlx supabase start
# which reads infra/supabase/config.toml. This compose file is the minimal,
# dependency-free path for contributors who only need a database.
services:
  postgres:
    image: postgres:16-alpine
    container_name: ourai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ourai
      POSTGRES_PASSWORD: ourai
      POSTGRES_DB: ourai
    ports:
      - '5432:5432'
    volumes:
      - ourai-pgdata:/var/lib/postgresql/data
      # Migrations are Supabase-specific (reference the `auth` schema); apply
      # them with `pnpm dlx supabase db reset`, not the plain-Postgres initdb.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ourai -d ourai']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ourai-pgdata:
