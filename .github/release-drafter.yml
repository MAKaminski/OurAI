name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels: ['enhancement', 'feature']
  - title: '🐛 Bug Fixes'
    labels: ['bug', 'fix']
  - title: '📖 Documentation'
    labels: ['documentation']
  - title: '🧰 Maintenance'
    labels: ['chore', 'ci', 'dependencies']
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['minor', 'enhancement', 'feature']
  patch:
    labels: ['patch', 'bug', 'fix', 'chore']
  default: patch
template: |
  ## Changes

  $CHANGES
