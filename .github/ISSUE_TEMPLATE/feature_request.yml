name: ✨ Feature request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that OurAI makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web
        - orchestrator
        - persistence
        - model-gateway
        - agent-core
        - tools
        - docs
        - other / not sure
    validations:
      required: true
