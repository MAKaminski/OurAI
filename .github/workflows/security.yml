name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

# Dependency vulnerability alerts are handled by Dependabot (.github/dependabot.yml).
# actions/dependency-review-action requires the GitHub dependency graph, which
# isn't available on all repos, so it is intentionally omitted here.
jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
